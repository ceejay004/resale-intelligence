<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resale Quick Compare</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:18px}
h2{text-align:center}
.card{background:white;padding:16px;border-radius:12px;margin-bottom:14px;box-shadow:0 3px 8px rgba(0,0,0,.08)}
input,textarea,button{width:100%;padding:12px;border-radius:10px;margin-top:8px;font-size:16px}
button{background:#16a34a;color:white;border:none;font-weight:bold}
.market-btn{background:#1f2937;margin-top:6px}
.result{font-size:20px;font-weight:bold;text-align:center}
textarea{height:120px}
.small{color:#666;font-size:14px;margin-top:6px}
</style>
</head>

<body>

<h2>Resale Quick Compare</h2>

<div class="card">
<b>1. Search Item</b>
<input id="item" placeholder="Enter item name">
<button onclick="search()">Open All Markets</button>
<button class="market-btn" onclick="ebay()">eBay Sold</button>
<button class="market-btn" onclick="amazon()">Amazon</button>
<button class="market-btn" onclick="facebook()">Facebook Marketplace</button>
</div>

<div class="card">
<b>2. Paste Sold Prices (one per line)</b>
<textarea id="prices" placeholder="Example:
39.99
42
37.50
45"></textarea>
<button onclick="calculate()">Auto Calculate</button>
<div class="small">Tip: copy prices directly from eBay sold listings</div>
</div>

<div id="result"></div>

<script>
function search(){
const item=document.getElementById('item').value;
if(!item) return;
ebay(); amazon(); facebook();
}

function ebay(){
const item=document.getElementById('item').value;
window.open("https://www.ebay.co.uk/sch/i.html?_nkw="+encodeURIComponent(item)+"&LH_Sold=1&LH_Complete=1");
}

function amazon(){
const item=document.getElementById('item').value;
window.open("https://www.amazon.co.uk/s?k="+encodeURIComponent(item));
}

function facebook(){
const item=document.getElementById('item').value;
window.open("https://www.facebook.com/marketplace/search/?query="+encodeURIComponent(item));
}

function calculate(){

const lines=document.getElementById('prices').value.split(/\n/);

const nums=lines
.map(v=>parseFloat(v.replace(/[^\d.]/g,'')))
.filter(v=>!isNaN(v));

if(nums.length<2){
alert("Paste at least 2 prices");
return;
}

const avg=nums.reduce((a,b)=>a+b,0)/nums.length;

const quick=avg*0.70;
const normal=avg*0.90;
const max=avg*1.15;

let verdict="OK BUY";
let color="#ca8a04";

if(quick<20){verdict="LOW VALUE ITEM";color="#6b7280";}
if(normal-quick>25){verdict="GOOD PROFIT";color="#16a34a";}
if(quick>normal*0.95){verdict="AVOID";color="#dc2626";}

document.getElementById('result').innerHTML=`
<div class="card">Detected average: £${avg.toFixed(2)} (${nums.length} sales)</div>
<div class="card">Quick flip: £${quick.toFixed(2)}</div>
<div class="card">Normal sale: £${normal.toFixed(2)}</div>
<div class="card">Max patience: £${max.toFixed(2)}</div>
<div class="card result" style="color:${color}">${verdict}</div>
`;
}
</script>

</body>
</html>
